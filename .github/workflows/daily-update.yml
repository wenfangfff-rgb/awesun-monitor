name: Daily competitor data update

on:
  schedule:
    # 01:00 UTC = 09:00 Asia/Shanghai
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: daily-data-update
  cancel-in-progress: false

jobs:
  collect-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install free collector dependencies
        run: python -m pip install -r requirements-free.txt

      - name: Collect competitor data
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python scripts/free_collect.py

      - name: Commit updated daily data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update daily competitor data"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Push updated main
        if: steps.commit.outputs.changed == 'true'
        run: git push origin HEAD:main

      - name: Sync gh-pages branch
        if: steps.commit.outputs.changed == 'true'
        run: git push origin HEAD:gh-pages

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static files
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
